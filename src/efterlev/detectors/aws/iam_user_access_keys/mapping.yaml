detector_id: aws.iam_user_access_keys

# KSI-IAM-MFA is claimed despite access keys not being MFA themselves —
# see docstring in detector.py. An access key is a credential that
# bypasses MFA by design, and the KSI's statement commits to enforcing
# MFA for user authentication. Access keys are materially relevant to
# that commitment. Contrast iam_password_policy (ksis=[]) which only
# evidences password strength, not MFA.
ksis:
  - KSI-IAM-MFA

controls:
  - id: IA-2
    evidence_type: infrastructure
    coverage: partial
    notes: >
      Infrastructure-layer evidence only. The detector flags declared
      aws_iam_access_key resources. It does NOT evidence whether the
      key is used, rotation cadence (procedural at AWS), or whether
      a federated alternative is in flight.
  - id: AC-2
    evidence_type: infrastructure
    coverage: partial
    notes: >
      Account-management-layer evidence: a long-lived programmatic
      credential is attached to an IAM user. Does not cover whether
      the user is actually active, the broader role/group posture, or
      procedural access-review cadence.
