detector_id: aws.cloudtrail_audit_logging

ksis:
  - id: KSI-MLA-LET
    coverage: partial
    notes: >
      Infrastructure-layer evidence. Confirms an aws_cloudtrail resource
      exists with management-event coverage. Does not confirm event-type
      coverage beyond management events, nor downstream SIEM ingestion.
  - id: KSI-MLA-OSM
    coverage: partial
    notes: >
      CloudTrail is the SIEM ingest surface at AWS. The detector confirms
      events are being generated; it does not evidence that those events
      flow to a SIEM or that alerting is configured — those live in the
      SIEM's own configuration, outside Terraform.
  - id: KSI-CMT-LMC
    coverage: partial
    notes: >
      Cross-mapped 2026-04-27 (Priority 1.8). KSI-CMT-LMC ("Log and monitor
      modifications to the cloud service offering") asks for change logging
      at the cloud service layer; CloudTrail logs every API call (including
      every CRUD operation against AWS resources), which IS the modification
      log. AU-2 is in KSI-CMT-LMC's `controls` array per FRMR 0.9.43-beta —
      clean cross-map, not invented. Does NOT evidence downstream review
      processes (CM-3.2 / CM-4.2) or change-management procedure
      effectiveness (procedural concerns).

controls:
  - id: AU-2
    evidence_type: infrastructure
    coverage: partial
    notes: Event logging enabled at the control-plane layer.
  - id: AU-12
    evidence_type: infrastructure
    coverage: partial
    notes: Audit record generation via CloudTrail.
