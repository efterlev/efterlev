detector_id: aws.cloudtrail_log_file_validation

# FRMR 0.9.43-beta lists au-9 in KSI-MLA-OSM's controls array. Clean mapping.
ksis:
  - KSI-MLA-OSM

controls:
  - id: AU-9
    evidence_type: infrastructure
    coverage: partial
    notes: >
      Infrastructure-layer evidence only. The detector confirms that a
      CloudTrail trail declares enable_log_file_validation=true, which is
      AWS's native integrity-digest mechanism. It does not evidence
      downstream SIEM handling of the integrity tokens, periodic
      validation exercises, S3 object-lock posture on the log bucket,
      or runtime state.
