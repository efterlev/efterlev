# Doc-vs-code drift check.
#
# Catches the class of bug the round-2 reviewer flagged (April 2026):
# numeric claims in prose ("344 passing", "60 indicators") and command
# references ("`efterlev detectors list`") diverging from runtime.
# The honesty-pass model is unsustainable for a single-author repo —
# by the time the maintainer notices a number went stale, the next
# one already has. This workflow makes the check enforceable.
#
# Runs on every PR and on push to main. Fast (no clone of external
# repos like the dogfood workflow); lives on the critical-path PR
# check intentionally.

name: check-docs

on:
  pull_request:
    paths:
      - '**/*.md'
      - 'src/efterlev/**'
      - 'catalogs/**'
      - 'scripts/check-docs.py'
      - '.github/workflows/check-docs.yml'
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - 'src/efterlev/**'
      - 'catalogs/**'
      - 'scripts/check-docs.py'
      - '.github/workflows/check-docs.yml'

permissions:
  contents: read

jobs:
  check-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install Efterlev
        run: uv sync --extra dev

      - name: Doc-vs-code drift check
        run: uv run python scripts/check-docs.py
